services:
  server:
    build:
      context: .
      dockerfile: infra/docker/server.Dockerfile
    environment:
      PORT: "8080"
      SESSION_SECRET: "local-dev-secret-change-me"
      REQUIRE_PLAY_INTEGRITY: "false"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: mahjongqqu
      POSTGRES_USER: mahjongqqu
      POSTGRES_PASSWORD: mahjongqqu
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/sql/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:8
    ports:
      - "6379:6379"

volumes:
  postgres-data:
